name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (tsc + vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Vite build
        run: npx vite build

  backend:
    name: Backend (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tauri 2 on Ubuntu 24.04 needs webkit2gtk 4.1 and the ayatana
      # appindicator. `libappindicator3-dev` is gone on 24.04 (replaced by
      # libayatana-appindicator3-dev), so listing it would fail the apt-get.
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets
